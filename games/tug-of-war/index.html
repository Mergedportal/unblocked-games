<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tug of War</title>
    <!-- ADDED FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding&family=Sixtyfour&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --crt-green: #39ff14;
            --p1-blue: #00d2ff;
            --p2-red: #ff0055;
            /* UPDATED FONT VARIABLE */
            --font-main: 'Sixtyfour', sans-serif;
        }

        body { 
            background: #050505; 
            color: white; 
            font-family: var(--font-main); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        #monitor {
            position: relative;
            padding: 20px;
            background: #1a1a1a;
            border: 15px solid #252525;
            border-radius: 40px;
            box-shadow: 0 0 60px rgba(0,0,0,1), inset 0 0 80px #000;
        }

        #monitor::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
            z-index: 20;
            border-radius: 25px;
        }

        canvas { 
            background: #080808; 
            display: block; 
            filter: contrast(1.1) brightness(1.1);
            image-rendering: pixelated;
        }

        .hud { display: flex; justify-content: space-around; width: 900px; margin-bottom: 20px; }
        .p-info { font-size: 14px; text-align: center; letter-spacing: 1px; }
        #status { font-size: 2rem; color: var(--crt-green); margin-bottom: 25px; text-shadow: 0 0 15px var(--crt-green); }
        .stats { color: #888; font-size: 10px; margin-top: 8px; font-family: 'Nanum Gothic Coding', monospace; }

        #playAgain {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-family: var(--font-main);
            background: rgba(0, 0, 0, 0.9);
            color: var(--crt-green);
            border: 6px solid var(--crt-green);
            cursor: pointer;
            font-size: 1.5rem;
            text-transform: uppercase;
            box-shadow: 0 0 30px var(--crt-green);
            transition: all 0.2s;
            z-index: 100;
        }

        #playAgain:hover {
            background: var(--crt-green);
            color: #000;
            box-shadow: 0 0 20px var(--crt-green);
        }
    </style>
</head>
<body>

    <div id="status">TAP TO START</div>

    <div id="monitor">
        <div class="hud">
            <div class="p-info" style="color: var(--p1-blue)">P1 [A]<div id="p1-stats" class="stats">POWER: 1.0X</div></div>
            <div class="p-info" style="color: var(--p2-red)">P2 [L]<div id="p2-stats" class="stats">POWER: 1.0X</div></div>
        </div>
        <canvas id="gameCanvas" width="900" height="350"></canvas>
    </div>

    <button id="playAgain">PLAY AGAIN</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const playAgainBtn = document.getElementById('playAgain');

        const START_SPEED = 0.008;
        const START_WIDTH = 0.22;
        const BASE_PULL = 20;

        let gameState = {
            ropePos: 0,
            visualRopePos: 0,
            p1: { speed: START_SPEED, width: START_WIDTH, ind: 0, dir: 1, flash: 0 },
            p2: { speed: START_SPEED, width: START_WIDTH, ind: 0, dir: 1, flash: 0 },
            gameOver: false,
            wave: 0
        };

        function resetGame() {
            gameState = {
                ropePos: 0,
                visualRopePos: 0,
                p1: { speed: START_SPEED, width: START_WIDTH, ind: 0, dir: 1, flash: 0 },
                p2: { speed: START_SPEED, width: START_WIDTH, ind: 0, dir: 1, flash: 0 },
                gameOver: false,
                wave: 0
            };
            statusEl.innerText = "TAP TO START";
            statusEl.style.color = "var(--crt-green)";
            playAgainBtn.style.display = "none";
            update();
        }

        playAgainBtn.addEventListener('click', resetGame);

        function drawFinishLine(x) {
            const tileSize = 12;
            const cols = 2;
            const rows = 14;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    ctx.fillStyle = (r + c) % 2 === 0 ? "#fff" : "#000";
                    ctx.fillRect(x + (c * tileSize) - (cols * tileSize / 2), 40 + (r * tileSize), tileSize, tileSize);
                }
            }
        }

        function drawBar(x, y, p, color, isP1) {
            const w = 320, h = 20;
            ctx.fillStyle = "#151515";
            ctx.fillRect(x, y, w, h);
            
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.2 + (p.flash * 0.8);
            ctx.shadowBlur = 12; ctx.shadowColor = color;
            ctx.fillRect(x + (0.5 - p.width/2) * w, y, p.width * w, h);
            ctx.shadowBlur = 0; ctx.globalAlpha = 1.0;

            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 10; ctx.shadowColor = "#fff";
            ctx.fillRect(x + Math.floor(p.ind * w) - 4, y - 6, 8, h + 12);
            ctx.shadowBlur = 0;

            const multiplier = (p.speed / START_SPEED).toFixed(1);
            document.getElementById(isP1 ? 'p1-stats' : 'p2-stats').innerText = `POWER: ${multiplier}X`;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cy = 140;
            const rx = 450 + gameState.visualRopePos;

            ctx.strokeStyle = "#5d4037";
            ctx.lineWidth = 18;
            ctx.beginPath();
            ctx.moveTo(0, cy);
            ctx.lineTo(canvas.width, cy);
            ctx.stroke();

            drawFinishLine(120);
            drawFinishLine(780);

            gameState.wave += 0.22;
            ctx.fillStyle = "#d32f2f";
            ctx.shadowBlur = 20; ctx.shadowColor = "#d32f2f";
            ctx.beginPath();
            
            ctx.moveTo(rx, cy - 5);
            for(let i=0; i<=35; i++) {
                ctx.lineTo(rx + i, (cy - 45) + Math.sin(gameState.wave + i * 0.25) * 6);
            }
            for(let i=35; i>=0; i--) {
                ctx.lineTo(rx + i, (cy - 10) + Math.sin(gameState.wave + i * 0.25) * 6);
            }
            
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = "#fff";
            ctx.fillRect(rx - 3, cy - 12, 6, 24);

            drawBar(80, 280, gameState.p1, "#39ff14", true);
            drawBar(500, 280, gameState.p2, "#39ff14", false);
        }

        function update() {
            if (gameState.gameOver) return;

            [gameState.p1, gameState.p2].forEach(p => {
                p.ind += p.speed * p.dir;
                if (p.ind > 1 || p.ind < 0) p.dir *= -1;
                if (p.flash > 0) p.flash -= 0.05;
            });

            gameState.visualRopePos += (gameState.ropePos - gameState.visualRopePos) * 0.12;

            draw();
            
            if (Math.abs(gameState.ropePos) > 350) {
                gameState.gameOver = true;
                const p1Wins = gameState.ropePos < 0;
                statusEl.innerText = p1Wins ? "P1 WINS" : "P2 WINS";
                statusEl.style.color = p1Wins ? "var(--p1-blue)" : "var(--p2-red)";
                statusEl.style.textShadow = `0 0 15px ${p1Wins ? "var(--p1-blue)" : "var(--p2-red)"}`;
                playAgainBtn.style.display = "block";
            } else {
                requestAnimationFrame(update);
            }
        }

        window.addEventListener('keydown', (e) => {
            if (gameState.gameOver) return;
            let key = e.key.toLowerCase();
            if (key !== 'a' && key !== 'l') return;

            let p = (key === 'a') ? gameState.p1 : gameState.p2;
            const isHit = Math.abs(p.ind - 0.5) < p.width / 2;

            if (isHit) {
                const powerMult = p.speed / START_SPEED;
                gameState.ropePos += (key === 'a' ? -BASE_PULL : BASE_PULL) * powerMult;
                p.speed += 0.0035;
                p.width = Math.max(0.04, p.width - 0.012);
                p.flash = 1;
            } else {
                p.speed = START_SPEED;
                p.width = START_WIDTH;
            }
        });

        update();
    </script>
</body>
</html>
