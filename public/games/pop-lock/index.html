<!DOCTYPE html>
<html>
<head>
    <title>Pop the Lock</title>
    <style>
        @import url('https://fonts.googleapis.com');
        
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background: #0a0a0a; 
            font-family: 'Inter', sans-serif; overflow: hidden; user-select: none;
        }

        #game-container {
            display: flex; flex-direction: column; align-items: center;
            position: relative;
        }

        /* Top Text Area */
        #ui-top {
            text-align: center; margin-bottom: 20px;
        }

        #best-label {
            font-size: 18px; color: #ffcc00; letter-spacing: 4px;
            text-transform: uppercase; margin-bottom: 5px;
        }

        #high-score {
            font-size: 48px; color: white; line-height: 1;
        }

        /* Main Game Area */
        #circle-wrap {
            position: relative; width: 360px; height: 360px;
            background: #111; border-radius: 50%;
            border: 15px solid #333; box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        canvas { border-radius: 50%; }

        #score-center {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px; color: white; font-weight: 900;
            pointer-events: none; z-index: 10;
        }

        .alert { color: #ff0044 !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-top">
            <div id="best-label">BEST</div>
            <div id="high-score">0</div>
        </div>

        <div id="circle-wrap">
            <div id="score-center">0</div>
            <canvas id="gameCanvas" width="360" height="360"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-center');
        const highEl = document.getElementById('high-score');

        let score = 0, angle = 0, direction = 1, isPlaying = false;
        const baseSpeed = 0.045;
        let currentSpeed = baseSpeed;
        let targetAngle = Math.random() * Math.PI * 2;
        let highScore = localStorage.getItem('lockBest') || 0;
        highEl.innerText = highScore;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = 145;

            // 1. Static Track
            ctx.strokeStyle = "#222";
            ctx.lineWidth = 35;
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.stroke();

            // 2. Target (Yellow Bolt)
            ctx.fillStyle = "#ffcc00";
            ctx.beginPath();
            ctx.arc(cx + Math.cos(targetAngle) * radius, cy + Math.sin(targetAngle) * radius, 16, 0, Math.PI * 2);
            ctx.fill();

            // 3. Indicator (Red Bar)
            ctx.strokeStyle = "#ff0044";
            ctx.lineWidth = 15;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(angle) * (radius - 22), cy + Math.sin(angle) * (radius - 22));
            ctx.lineTo(cx + Math.cos(angle) * (radius + 22), cy + Math.sin(angle) * (radius + 22));
            ctx.stroke();

            if (isPlaying) {
                angle += currentSpeed * direction;
            }
            requestAnimationFrame(draw);
        }

        function handleInput() {
            if (!isPlaying) {
                resetGame();
                isPlaying = true;
                return;
            }

            const normA = ((angle % (Math.PI * 2)) + (Math.PI * 2)) % (Math.PI * 2);
            const normT = ((targetAngle % (Math.PI * 2)) + (Math.PI * 2)) % (Math.PI * 2);
            let diff = Math.abs(normA - normT);
            if (diff > Math.PI) diff = Math.PI * 2 - diff;

            if (diff < 0.23) {
                score++;
                scoreEl.innerText = score;
                currentSpeed *= 1.05; // Hidden 5% increase
                direction *= -1;
                targetAngle = angle + (direction * (1.2 + Math.random() * 2));
            } else {
                fail();
            }
        }

        function fail() {
            isPlaying = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('lockBest', highScore);
                highEl.innerText = highScore;
            }
        }

        function resetGame() {
            score = 0; scoreEl.innerText = "0";
            currentSpeed = baseSpeed; angle = 0; direction = 1;
            targetAngle = Math.random() * Math.PI * 2;
        }

        window.addEventListener('mousedown', (e) => { e.preventDefault(); handleInput(); });
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') { e.preventDefault(); handleInput(); } });

        draw();
    </script>
</body>
</html>
